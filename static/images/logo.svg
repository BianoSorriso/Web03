<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <style>
    .logo-text { font-family: 'Arial', sans-serif; font-weight: bold; }
    .primary { fill: #4e73df; }
    .secondary { fill: #1cc88a; }
  </style>
  
  <!-- Símbolo de mãos unidas -->
  <g transform="translate(10, 10)">
    <path class="primary" d="M20,0 C25,5 30,8 40,8 C30,15 25,20 20,25 C15,20 10,15 0,8 C10,8 15,5 20,0 Z" />
    <path class="secondary" d="M20,5 C23,8 26,10 32,10 C26,15 23,18 20,21 C17,18 14,15 8,10 C14,10 17,8 20,5 Z" />
  </g>
  
  <!-- Texto da ONG -->
  <text x="60" y="30" class="logo-text primary" font-size="24">ONG</text>
  <text x="60" y="50" class="logo-text secondary" font-size="20">Solidária</text>
</svg>